<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Derin...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000000;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: absolute;
    inset: 0;
    display: block;
  }

  .center-text {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    text-align: center;
    padding: 0 6vw;
  }

  .greeting {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.8rem, 10vw, 5.6rem);
    color: #ffe3e9;
    letter-spacing: 0.01em;
    animation: breathe 4.5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% {
      text-shadow:
        0 0 6px rgba(255, 190, 200, 0.35),
        0 0 18px rgba(226, 132, 206, 0.25),
        0 0 36px rgba(255, 158, 170, 0.15);
      opacity: 0.9;
      filter: brightness(1);
    }
    50% {
      text-shadow:
        0 0 14px rgba(255, 190, 200, 0.65),
        0 0 34px rgba(226, 132, 206, 0.45),
        0 0 64px rgba(255, 158, 170, 0.3);
      opacity: 1;
      filter: brightness(1.08);
    }
  }

  .hint {
    position: fixed;
    bottom: 6.5vh;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.28);
    z-index: 10;
    pointer-events: none;
    animation: hintFade 3.2s ease-in-out infinite;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.16; transform: translateY(0); }
    50% { opacity: 0.45; transform: translateY(-3px); }
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="fireworks"></canvas>
</div>

<div class="center-text">
  <div class="greeting">Derin...</div>
</div>

<div class="hint">ekrana dokun</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d', { alpha: false });

  // ---------- Config ----------
  // Total on-screen "particle budget" is kept well under 300 by splitting it
  // between two cheap-to-draw pools (flowers are the expensive visual centerpiece,
  // pollen are cheap glowing dots used for the firework-burst feel and sparkle-only bursts).
  const MAX_FLOWERS = 22;
  const MAX_POLLEN = 140;
  const PALETTE = ['#ffb7b2', '#e284ce', '#ff9eaa', '#ffdfba', '#d4a5a5', '#ffd6e8', '#f7cac9'];
  const GOLD = '#ffd88a';
  const LOVE_TEXT = 'Seni Seviyorum';
  const LOVE_CHANCE = 0.3;

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let width = 0;
  let height = 0;

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // opaque base so the very first frame isn't transparent, and so
    // the trail effect always fades against solid black, never gray
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, width, height);
  }

  window.addEventListener('resize', resize);
  resize();

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function randInt(min, max) {
    return Math.floor(rand(min, max + 1));
  }

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ---------- Arrays (each capped independently, oldest culled first) ----------
  let flowers = [];
  let pollens = [];
  let floatingTexts = [];
  let ripples = [];

  // ---------- Flower Class (blooming centerpiece) ----------
  class Flower {
    constructor(x, y, scaleBias) {
      this.x = x;
      this.y = y;
      this.scale = 0; // starts at 0, blooms up via ease-out
      this.maxScale = rand(0.45, 1.05) * (scaleBias || 1);
      this.rotation = rand(0, Math.PI * 2);
      this.spin = rand(-0.0025, 0.0025);

      this.life = 1;
      this.decay = rand(0.0035, 0.0065); // blooms, lingers briefly, fades over ~3-5s

      this.type = pick(['lotus', 'sakura', 'rose']);
      this.color = pick(PALETTE);
      this.coreColor = GOLD;
      this.dead = false;
    }

    update() {
      this.scale += (this.maxScale - this.scale) * 0.09;
      this.rotation += this.spin;
      this.life -= this.decay;
      if (this.life <= 0) this.dead = true;
    }

    draw(ctx) {
      const alpha = Math.max(0, this.life);
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.scale(this.scale, this.scale);
      ctx.globalAlpha = alpha;

      if (this.type === 'lotus') {
        // 8 soft overlapping petals, single highlight pass — cheap and elegant
        for (let i = 0; i < 8; i++) {
          ctx.rotate((Math.PI * 2) / 8);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.quadraticCurveTo(20, -30, 0, -70);
          ctx.quadraticCurveTo(-20, -30, 0, 0);
          ctx.fillStyle = this.color;
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.quadraticCurveTo(8, -25, 0, -45);
          ctx.quadraticCurveTo(-8, -25, 0, 0);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
          ctx.fill();
        }
      } else if (this.type === 'sakura') {
        // 5 rounded cherry-blossom petals with a golden stamen core
        for (let i = 0; i < 5; i++) {
          ctx.rotate((Math.PI * 2) / 5);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(25, -20, 25, -50, 0, -60);
          ctx.bezierCurveTo(-25, -50, -25, -20, 0, 0);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        // stamens drawn once, not per petal — same visual read, far fewer draw calls
        for (let i = 0; i < 5; i++) {
          const a = (Math.PI * 2 * i) / 5;
          const sx = Math.cos(a) * 22;
          const sy = Math.sin(a) * 22;
          ctx.beginPath();
          ctx.arc(sx, sy, 2.6, 0, Math.PI * 2);
          ctx.fillStyle = this.coreColor;
          ctx.fill();
        }
      } else {
        // rose: 3 concentric layers instead of 5 — visually full, ~60% cheaper to draw
        const layers = 3;
        for (let j = layers; j > 0; j--) {
          const radius = j * 11;
          const petals = 4 + j;
          ctx.fillStyle = j % 2 === 0 ? this.color : '#ffc1cc';
          for (let i = 0; i < petals; i++) {
            ctx.rotate((Math.PI * 2) / petals + j * 0.35);
            ctx.beginPath();
            ctx.arc(0, -radius * 0.6, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        // single soft core to finish the read
        ctx.beginPath();
        ctx.arc(0, 0, 6, 0, Math.PI * 2);
        ctx.fillStyle = this.coreColor;
        ctx.fill();
      }

      ctx.restore();
    }
  }

  // ---------- Pollen Class (firework sparks / magical dust) ----------
  // Real physics: velocity, friction, gravity — this is what gives the "havai fişek" burst feel.
  class Pollen {
    constructor(x, y, angle, gold) {
      this.reset(x, y, angle, gold);
    }

    reset(x, y, angle, gold) {
      this.x = x;
      this.y = y;
      this.gold = !!gold;

      const speed = rand(1.8, 6.5);
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;

      this.friction = rand(0.94, 0.972);
      this.gravity = rand(0.015, 0.045);

      this.size = this.gold ? rand(1.6, 3.2) : rand(2, 4.2);
      this.color = this.gold ? GOLD : pick(PALETTE);

      this.life = 1;
      this.decay = rand(0.01, 0.02);
      this.dead = false;
    }

    update() {
      this.vx *= this.friction;
      this.vy *= this.friction;
      this.vy += this.gravity;

      this.x += this.vx;
      this.y += this.vy;

      this.life -= this.decay;
      if (this.life <= 0) this.dead = true;
    }

    draw(ctx) {
      const alpha = Math.max(0, this.life);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = this.size * 3;
      ctx.fill();
      ctx.restore();
    }
  }

  // ---------- Pooled spawning with hard caps (culls oldest first) ----------

  function spawnFlower(x, y, scaleBias) {
    for (let i = 0; i < flowers.length; i++) {
      if (flowers[i].dead) {
        flowers[i] = new Flower(x, y, scaleBias);
        return;
      }
    }
    flowers.push(new Flower(x, y, scaleBias));
    if (flowers.length > MAX_FLOWERS) {
      flowers.splice(0, flowers.length - MAX_FLOWERS);
    }
  }

  function spawnPollen(x, y, angle, gold) {
    for (let i = 0; i < pollens.length; i++) {
      if (pollens[i].dead) {
        pollens[i].reset(x, y, angle, gold);
        return;
      }
    }
    pollens.push(new Pollen(x, y, angle, gold));
    if (pollens.length > MAX_POLLEN) {
      pollens.splice(0, pollens.length - MAX_POLLEN);
    }
  }

  function spawnPollenBurst(x, y, count, allGold) {
    for (let i = 0; i < count; i++) {
      const angle = rand(0, Math.PI * 2);
      spawnPollen(x, y, angle, allGold || Math.random() < 0.35);
    }
  }

  // ---------- Floating "Seni Seviyorum" text ----------

  class FloatingText {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vy = rand(-0.85, -0.55);
      this.life = 1;
      this.decay = rand(0.0055, 0.0075); // ~2.2 - 3s at 60fps
      this.scale = rand(0.92, 1.08);
      this.color = pick(['#ffd1dc', '#f3c6e0', '#ffe3ea']);
      this.drift = rand(-0.15, 0.15);
      this.dead = false;
    }

    update() {
      this.y += this.vy;
      this.x += this.drift;
      this.vy *= 0.996;
      this.life -= this.decay;
      if (this.life <= 0) this.dead = true;
    }

    draw(ctx) {
      const alpha = Math.max(0, this.life);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(this.x, this.y);
      ctx.scale(this.scale, this.scale);
      ctx.font = "italic 400 30px 'Cormorant Garamond', serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 16;
      ctx.fillText(LOVE_TEXT, 0, 0);
      ctx.restore();
    }
  }

  // ---------- Subtle tap ripple ----------

  function addRipple(x, y, color) {
    ripples.push({ x, y, r: 0, maxR: rand(55, 100), alpha: 0.4, color });
  }

  function updateAndDrawRipples(ctx) {
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r += 2.3;
      rp.alpha -= 0.02;
      if (rp.alpha <= 0) {
        ripples.splice(i, 1);
        continue;
      }
      ctx.save();
      ctx.globalAlpha = Math.max(0, rp.alpha);
      ctx.strokeStyle = rp.color;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ---------- Burst logic: pattern varies every single tap ---------- 

  function triggerBurst(x, y) {
    const roll = Math.random();

    if (roll < 0.15) {
      // sparkle-only burst: just glowing gold dust, no flower
      spawnPollenBurst(x, y, randInt(22, 34), true);
    } else if (roll < 0.7) {
      // one flower blooming with a light halo of colored sparks around it
      spawnFlower(x, y, rand(0.85, 1.15));
      spawnPollenBurst(x, y, randInt(10, 20), false);
    } else {
      // a fuller bouquet: 2-3 smaller flowers scattered near the tap point
      const count = randInt(2, 3);
      for (let i = 0; i < count; i++) {
        const ox = x + rand(-46, 46);
        const oy = y + rand(-46, 46);
        spawnFlower(ox, oy, rand(0.45, 0.75));
      }
      spawnPollenBurst(x, y, randInt(16, 28), false);
    }

    addRipple(x, y, pick(PALETTE));

    if (Math.random() < LOVE_CHANCE) {
      floatingTexts.push(new FloatingText(x, y));
    }
  }

  // ---------- Main loop ----------

  let frameCount = 0;

  function loop() {
    // trail effect instead of clearRect — gives the soft, dreamy fade
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, width, height);

    updateAndDrawRipples(ctx);

    for (let i = 0; i < pollens.length; i++) {
      const p = pollens[i];
      if (p.dead) continue;
      p.update();
      if (!p.dead) p.draw(ctx);
    }

    for (let i = 0; i < flowers.length; i++) {
      const f = flowers[i];
      if (f.dead) continue;
      f.update();
      if (!f.dead) f.draw(ctx);
    }

    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const t = floatingTexts[i];
      t.update();
      if (t.dead) {
        floatingTexts.splice(i, 1);
        continue;
      }
      t.draw(ctx);
    }

    // periodically compact pooled arrays so dead slots never accumulate indefinitely
    frameCount++;
    if (frameCount % 180 === 0) {
      flowers = flowers.filter((f) => !f.dead);
      pollens = pollens.filter((p) => !p.dead);
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  // ---------- Input handling ----------

  canvas.addEventListener('mousedown', (e) => {
    triggerBurst(e.clientX, e.clientY);
  });

  window.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      triggerBurst(touch.clientX, touch.clientY);
    }
  }, { passive: false });

  // block pull-to-refresh / page bounce / pinch-zoom entirely
  document.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('gesturestart', (e) => {
    e.preventDefault();
  });

  // small opening bloom so the page doesn't feel empty before the first touch
  window.addEventListener('load', () => {
    setTimeout(() => {
      triggerBurst(width / 2, height * 0.42);
    }, 700);
  });

})();
</script>

</body>
</html>
